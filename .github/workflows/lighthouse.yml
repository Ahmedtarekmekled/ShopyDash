name: Lighthouse CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  lighthouse:
    name: Lighthouse Performance Test
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

      - name: Start preview server
        run: npm run preview -- --host 127.0.0.1 --port 4173 > server.log 2>&1 &
        env:
          NODE_ENV: production

      - name: Wait for server to start
        run: npx wait-on http://127.0.0.1:4173 -t 30000

      - name: Install Lighthouse and Puppeteer
        run: npm install -g @lhci/cli@0.13.0 && npm install puppeteer --no-save

      - name: Run Lighthouse CI
        run: |
          export CHROME_PATH=$(node -e "console.log(require('puppeteer').executablePath())")
          lhci autorun --chrome-flags="--no-sandbox --disable-setuid-sandbox --disable-gpu --headless=new --single-process"
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}
          PUPPETEER_SKIP_CHROMIUM_DOWNLOAD: "false"
