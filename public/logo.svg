<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 620 200" width="620" height="200">
  <defs>
    <!-- Main green gradient matching site -->
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2D8B72;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1B6B5A;stop-opacity:1" />
    </linearGradient>
    <!-- Orange accent matching site -->
    <linearGradient id="orangeGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#FF8C42;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FF6B35;stop-opacity:1" />
    </linearGradient>
    <!-- Combined gradient for special elements -->
    <linearGradient id="comboGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1B6B5A;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FF6B35;stop-opacity:1" />
    </linearGradient>
    <filter id="softShadow" x="-15%" y="-15%" width="130%" height="130%">
      <feDropShadow dx="0" dy="5" stdDeviation="8" flood-color="#1B6B5A" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- ===== ICON AREA ===== -->
  <!-- Rounded square background — matches site button style -->
  <rect x="18" y="28" width="144" height="144" rx="32" fill="url(#greenGrad)" filter="url(#softShadow)"/>

  <!-- Shopping bag — same icon style as site navbar -->
  <!-- Bag body -->
  <rect x="48" y="90" width="84" height="60" rx="9" fill="white" opacity="0.97"/>
  <!-- Bag handle -->
  <path d="M64 90 Q64 64 90 64 Q116 64 116 90" 
        fill="none" stroke="white" stroke-width="7" 
        stroke-linecap="round" opacity="0.97"/>
  <!-- Orange dot accent on bag — like site badge -->
  <circle cx="116" cy="82" r="12" fill="#FF6B35"/>
  <!-- Dash speed symbol inside dot -->
  <text x="116" y="87" 
        font-family="Arial, sans-serif" 
        font-size="13" font-weight="900" 
        fill="white" text-anchor="middle">→</text>

  <!-- ===== TEXT AREA ===== -->
  <!-- SHOPY — dark green matching site headings -->
  <text x="182" y="108"
        font-family="'Trebuchet MS', 'Segoe UI', sans-serif"
        font-size="62"
        font-weight="800"
        letter-spacing="-2"
        fill="#1A2E2A">Shopy</text>

  <!-- DASH — orange matching site accent color -->
  <text x="182" y="108"
        font-family="'Trebuchet MS', 'Segoe UI', sans-serif"
        font-size="62"
        font-weight="800"
        letter-spacing="-2"
        fill="#FF6B35"
        dx="196">Dash</text>

  <!-- Tagline in Arabic — matching site language -->
  <text x="184" y="138"
        font-family="'Segoe UI', 'Arial', sans-serif"
        font-size="14"
        font-weight="400"
        fill="#5A7A74"
        letter-spacing="0.5"
        direction="ltr">تسوق من متاجرك المحلية بسهولة</text>

  <!-- Green underline accent — matches site green CTA button style -->
  <rect x="182" y="150" width="90" height="3.5" rx="2" fill="url(#greenGrad)"/>
  <rect x="278" y="150" width="50" height="3.5" rx="2" fill="url(#orangeGrad)"/>

</svg>
